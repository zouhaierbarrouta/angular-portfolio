<nav class="navbar navbar-expand-lg site-navbar" [class.static-nav]="!isHomePage()" id="pb-navbar">

    <div class="container">

        <!-- Brand (optional, empty spacer to push toggler right) -->
        <span class="navbar-brand-spacer"></span>

        <!-- Right-side always-visible controls + toggler -->
        <div class="d-flex align-items-center ml-auto">
            <div class="language-toggle">
                <button [matMenuTriggerFor]="langMenu" class="nav-ctrl-btn">
                    <img src="/assets/images/icons/language.svg" alt="Language" class="nav-icon-img">
                </button>
                <mat-menu #langMenu="matMenu" class="custom-lang-menu">
                    <div class="p-3" (click)="$event.stopPropagation()">
                        <mat-radio-group [(ngModel)]="currentLanguage" (change)="changeLanguage($event.value)" class="d-flex flex-column">
                            <mat-radio-button value="en" class="mb-2">English (EN)</mat-radio-button>
                            <mat-radio-button value="fr" class="mb-2">Français (FR)</mat-radio-button>
                            <mat-radio-button value="ar" class="mb-2">العربية (AR)</mat-radio-button>
                        </mat-radio-group>
                    </div>
                </mat-menu>
            </div>

            <div class="theme-toggle ml-2">
                <button (click)="toggleTheme()" class="nav-ctrl-btn">
                    <img [src]="themeService.getTheme() === 'dark' ? '/assets/images/icons/sun.svg' : '/assets/images/icons/moon.svg'" 
                         [alt]="themeService.getTheme() === 'dark' ? 'Light Mode' : 'Dark Mode'"
                         class="nav-icon-img">
                </button>
            </div>

            <div class="statistics-toggle ml-2">
                <button (click)="onStatisticsClick($event)" class="nav-ctrl-btn">
                    <img src="/assets/images/icons/settings.svg" alt="Settings" class="nav-icon-img">
                </button>
            </div>

            <!-- Hamburger toggler right after controls -->
            <button class="navbar-toggler ml-2" type="button" data-toggle="collapse" data-target="#navbarsExample09"
                aria-controls="navbarsExample09" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>

        <!-- Collapsible nav links -->
        <div class="collapse navbar-collapse justify-content-md-center" id="navbarsExample09">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="#section-home" (click)="navigateToSection('section-home', $event)" data-i18n="nav.home">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="#section-about" (click)="navigateToSection('section-about', $event)" data-i18n="nav.about">About</a></li>
                <li class="nav-item"><a class="nav-link" href="#section-education" (click)="navigateToSection('section-education', $event)"
                        data-i18n="nav.education">Education</a></li>
                <li class="nav-item"><a class="nav-link" href="#section-experience" (click)="navigateToSection('section-experience', $event)"
                        data-i18n="nav.experience">Experience</a></li>
                <li class="nav-item"><a class="nav-link" href="#section-contact" (click)="navigateToSection('section-contact', $event)" data-i18n="nav.contact">Contact</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
