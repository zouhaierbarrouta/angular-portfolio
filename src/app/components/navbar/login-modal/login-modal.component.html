<h2 mat-dialog-title>{{ t('login.title', 'Admin Access') }}</h2>
<mat-dialog-content class="pb-4">
  <form (ngSubmit)="onLogin()" #loginForm="ngForm">
    <div class="row w-100 mx-0 mt-3">
      <div class="col-12 px-0">
        <div class="form-group mb-4">
          <label class="text-muted small text-uppercase mb-2 d-block" style="letter-spacing: 0.1rem;">{{ t('login.username', 'Username') }}</label>
          <div class="input-with-icon">
            <i class="icon-user"></i>
            <input type="text" class="form-control" [(ngModel)]="username" name="username" required autocomplete="username" [placeholder]="t('login.usernamePlaceholder', 'Enter admin username')">
          </div>
        </div>
      </div>
      
      <div class="col-12 px-0">
        <div class="form-group mb-4">
          <label class="text-muted small text-uppercase mb-2 d-block" style="letter-spacing: 0.1rem;">{{ t('login.password', 'Password') }}</label>
          <div class="input-with-icon">
            <i class="icon-lock"></i>
            <input [type]="hidePassword ? 'password' : 'text'" class="form-control" [(ngModel)]="password" name="password" required autocomplete="current-password" [placeholder]="t('login.passwordPlaceholder', 'Enter security key')">
            <button type="button" class="btn-toggle-pass" (click)="togglePasswordVisibility()">
              <i [className]="hidePassword ? 'icon-eye' : 'icon-eye-blocked'"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <div *ngIf="error" class="text-danger">
      <mat-icon class="align-middle mr-1" style="font-size: 18px;">warning</mat-icon> {{ error }}
    </div>
    
    <div class="modal-actions mt-4">
      <button type="button" (click)="onNoClick()" class="btn btn-outline-primary btn-cancel">
        {{ t('login.cancel', 'Cancel') }}
      </button>
      <button type="submit" class="btn btn-primary btn-login">
        {{ t('login.unlock', 'Unlock Dashboard') }}
      </button>
    </div>
  </form>
</mat-dialog-content>
